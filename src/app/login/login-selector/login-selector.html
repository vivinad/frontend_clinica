<div class="login-page">
  <div class="login-card">

    <div class="login-brand">
      <svg width="40" height="40" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="36" height="36" rx="8" fill="#185FA5"/>
        <path d="M18 8v20M8 18h20" stroke="white" stroke-width="4" stroke-linecap="round"/>
        <circle cx="18" cy="18" r="10" stroke="white" stroke-width="2" fill="none"/>
      </svg>
      <div>
        <span class="brand-name">MedSystem</span>
        <span class="brand-sub">Sistema de gestión clínica</span>
      </div>
    </div>

    <h1 class="login-title">Iniciar sesión</h1>
    <p class="login-sub">Ingresa tus credenciales para continuar</p>

    <div class="field">
      <label class="field-label">Usuario</label>
      <input
        class="field-input"
        type="text"
        placeholder="Ej: usuario@clinica.com"
        [(ngModel)]="usuario"
      />
    </div>

    <div class="field">
      <label class="field-label">Contraseña</label>
      <input
        class="field-input"
        type="password"
        placeholder="••••••••"
        [(ngModel)]="password"
      />
    </div>

    <p class="error-msg" *ngIf="error">{{ error }}</p>

    <button class="btn-login" (click)="ingresar()">Ingresar</button>

    <p class="forgot">¿Olvidaste tu contraseña? <span>Recupérala aquí</span></p>

  </div>
</div>
